name: Python syntax check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  py-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile project files
        run: |
          python -m py_compile *.py

